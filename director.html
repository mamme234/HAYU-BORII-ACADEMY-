<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Director Dashboard - Hayu Bori Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="logo.png" alt="Hayu Bori Academy" style="width:80px; border-radius:50%;" onerror="this.src='https://via.placeholder.com/80?text=HBA'">
            <h1>🏫 Hayu Bori Academy</h1>
            <div class="flag"><span style="background:#078930;"></span><span style="background:#fcdd09;"></span><span style="background:#da121a;"></span></div>
            <p style="color:white;">Director Portal</p>
        </div>

        <div id="directorLoginSection">
            <div class="form-card">
                <h2><i class="fas fa-chart-line"></i> Director Login</h2>
                <form id="directorLoginForm">
                    <div class="form-group"><label>Director Type</label>
                        <select id="directorType">
                            <option value="kg">KG Director (Nursery - Upper KG)</option>
                            <option value="elementary">Elementary Director (Grade 1-4)</option>
                            <option value="middle">Middle School Director (Grade 5-8)</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Password</label><input type="password" id="directorPassword" required></div>
                    <div class="form-group"><label>Upload Your Photo for Verification</label><input type="file" id="directorPhoto" accept="image/*" required></div>
                    <button type="submit">Login →</button>
                </form>
            </div>
        </div>
        <div id="directorProfileSection" style="display:none;"><div id="directorProfileContent"></div></div>

        <!-- ==================== MODALS ==================== -->
        <!-- Copy all modals from student.html -->
        <div id="purposeModal" class="modal">...</div>
        <div id="feedbackModal" class="modal">...</div>
        <div id="privacyModal" class="modal">...</div>
        <div id="contactModal" class="modal">...</div>

        <!-- ==================== SERVER STATUS & FOOTER ==================== -->
        <div id="serverStatus" class="server-status offline">🔌 Checking server...</div>
        
        <div class="footer-links">
            <a onclick="openModal('purposeModal')"><i class="fas fa-lightbulb"></i> Purpose</a>
            <a onclick="openModal('feedbackModal')"><i class="fas fa-comment-dots"></i> Feedback</a>
            <a onclick="openModal('privacyModal')"><i class="fas fa-shield-alt"></i> Privacy</a>
            <a onclick="openModal('contactModal')"><i class="fas fa-address-card"></i> Contact</a>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/director.js"></script>
</body>
</html>
